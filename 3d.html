<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D智能包装设计系统 | 专业版</title>
    <meta name="description" content="专业级3D包装设计工具 - 真实材质、实时渲染">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
        }

        /* 侧边控制面板 */
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 340px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            background: rgba(10, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            color: white;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            scrollbar-width: thin;
        }

        .control-panel::-webkit-scrollbar {
            width: 5px;
        }

        .control-panel::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .control-panel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        .panel-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title .icon {
            font-size: 1.8rem;
        }

        .panel-subtitle {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        /* 材质选择 */
        .material-group {
            margin-bottom: 20px;
        }

        .material-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #ddd;
        }

        .material-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .material-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 25px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .material-btn:hover, .material-btn.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-color: transparent;
        }

        /* 输入组 */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ddd;
        }

        .input-group label span:first-child {
            font-weight: 500;
        }

        .input-group label span:last-child {
            color: #4ade80;
            font-family: monospace;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 5px;
            background: linear-gradient(90deg, #4ade80, #3b82f6);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            border: 2px solid #3b82f6;
        }

        .value-input {
            margin-top: 8px;
            display: flex;
            gap: 10px;
        }

        .value-input input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
            text-align: center;
        }

        .value-input input:focus {
            outline: none;
            background: rgba(255,255,255,0.25);
        }

        /* 结果卡片 */
        .result-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 15px;
            padding: 18px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid rgba(75, 130, 250, 0.3);
        }

        .result-label {
            font-size: 0.8rem;
            color: #94a3b8;
            letter-spacing: 2px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: #4ade80;
            margin: 8px 0;
        }

        .result-detail {
            display: flex;
            justify-content: space-around;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .detail-item {
            text-align: center;
        }

        .detail-item .value {
            font-size: 1rem;
            font-weight: 600;
            color: #60a5fa;
        }

        .detail-item .label {
            font-size: 0.65rem;
            color: #64748b;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59,130,246,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 顶部导航 */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            flex-wrap: wrap;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.2s;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 20px;
        }

        .nav-item:hover {
            opacity: 0.7;
            background: rgba(255,255,255,0.1);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        .preset-group {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .preset-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #ccc;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: rgba(59,130,246,0.4);
        }

        @media (max-width: 768px) {
            .control-panel {
                width: calc(100% - 20px);
                right: 10px;
                left: 10px;
                bottom: 10px;
                top: auto;
                max-height: 55vh;
                padding: 15px;
            }
            .top-nav {
                top: auto;
                bottom: 10px;
                left: 10px;
                right: 10px;
                justify-content: center;
            }
            .result-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="top-nav">
            <div class="nav-item" onclick="exportAsImage()">📸 截图</div>
            <div class="nav-item" onclick="copyData()">📋 复制数据</div>
            <div class="nav-item" onclick="resetView()">🎯 重置视角</div>
            <div class="nav-item" onclick="toggleAutoRotate()">🔄 自动旋转</div>
        </div>

        <div class="control-panel">
            <div class="panel-title">
                <span class="icon">📦</span>
                <span>智能包装设计系统</span>
            </div>
            <div class="panel-subtitle">3D Packaging Designer | 真实材质</div>

            <!-- 材质选择 -->
            <div class="material-group">
                <label>🎨 包装材质</label>
                <div class="material-buttons">
                    <div class="material-btn active" data-mat="cardboard">📦 瓦楞纸</div>
                    <div class="material-btn" data-mat="wood">🪵 木箱</div>
                    <div class="material-btn" data-mat="plastic">💧 塑料</div>
                    <div class="material-btn" data-mat="metal">⚙️ 金属</div>
                    <div class="material-btn" data-mat="glass">🔮 玻璃</div>
                </div>
            </div>

            <div class="preset-group">
                <div class="preset-btn" onclick="setPreset(0.5,0.5,0.5)">📦 小箱</div>
                <div class="preset-btn" onclick="setPreset(1,1,1)">📦 标准箱</div>
                <div class="preset-btn" onclick="setPreset(2,1.5,1)">📦 大箱</div>
                <div class="preset-btn" onclick="setPreset(10,8,6)">🏭 工业托架</div>
                <div class="preset-btn" onclick="setPreset(100,80,60)">🏢 集装箱</div>
            </div>

            <div class="input-group">
                <label><span>📏 长度 L</span><span id="lengthValue">1.00 m</span></label>
                <input type="range" id="lengthSlider" min="0.2" max="100" step="0.5" value="1.5">
                <div class="value-input">
                    <input type="number" id="lengthInput" step="0.5" value="1.5">
                    <span style="background:rgba(255,255,255,0.1); padding:8px; border-radius:8px;">m</span>
                </div>
            </div>

            <div class="input-group">
                <label><span>📐 宽度 W</span><span id="widthValue">1.00 m</span></label>
                <input type="range" id="widthSlider" min="0.2" max="100" step="0.5" value="1.0">
                <div class="value-input">
                    <input type="number" id="widthInput" step="0.5" value="1.0">
                    <span style="background:rgba(255,255,255,0.1); padding:8px; border-radius:8px;">m</span>
                </div>
            </div>

            <div class="input-group">
                <label><span>📏 高度 H</span><span id="heightValue">1.00 m</span></label>
                <input type="range" id="heightSlider" min="0.2" max="100" step="0.5" value="0.8">
                <div class="value-input">
                    <input type="number" id="heightInput" step="0.5" value="0.8">
                    <span style="background:rgba(255,255,255,0.1); padding:8px; border-radius:8px;">m</span>
                </div>
            </div>

            <div class="result-card">
                <div class="result-label">包装总面积</div>
                <div class="result-value" id="totalArea">0.00 m²</div>
                <div class="result-detail">
                    <div class="detail-item"><div class="value" id="volume">0.00</div><div class="label">体积 m³</div></div>
                    <div class="detail-item"><div class="value" id="perimeter">0.00</div><div class="label">周长 m</div></div>
                    <div class="detail-item"><div class="value" id="diagonal">0.00</div><div class="label">对角线 m</div></div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="optimizeDimensions()">⚡ 立方体优化</button>
                <button class="btn-secondary" onclick="resetToDefault()">🔄 重置</button>
            </div>
        </div>
        <div id="toast" class="toast">已复制</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 材质库 ---
        const materials = {
            cardboard: new THREE.MeshStandardMaterial({ color: 0xc49a6c, roughness: 0.7, metalness: 0.05 }),
            wood: new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.6, metalness: 0.1 }),
            plastic: new THREE.MeshStandardMaterial({ color: 0x6ab0de, roughness: 0.4, metalness: 0.1, emissive: 0x001133 }),
            metal: new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.3, metalness: 0.85 }),
            glass: new THREE.MeshStandardMaterial({ color: 0xaaddff, roughness: 0.2, metalness: 0.9, transparent: true, opacity: 0.7 })
        };
        
        let currentMaterial = 'cardboard';

        // --- 场景初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.target.set(0, 0.5, 0);

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.4);
        backLight.position.set(-1, 1.5, -2);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0xff66aa, 0.3);
        rimLight.position.set(1.5, 1, -1.5);
        scene.add(rimLight);
        
        // 地面网格
        const gridHelper = new THREE.GridHelper(8, 20, 0x4a6eff, 0x2a3eff);
        gridHelper.position.y = -0.3;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // 地面反射平面
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(6, 6),
            new THREE.MeshStandardMaterial({ color: 0x1a1a3a, roughness: 0.4, metalness: 0.7, transparent: true, opacity: 0.2 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.3;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // 星空粒子
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(1500 * 3);
        for (let i = 0; i < 1500; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 80;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.06, transparent: true, opacity: 0.5 }));
        scene.add(stars);
        
        // --- 包装盒对象 ---
        let currentBox = null;
        let currentEdges = null;
        let dimensionLabel = null;
        
        function createBox(l, w, h) {
            const geometry = new THREE.BoxGeometry(l, h, w);
            const box = new THREE.Mesh(geometry, materials[currentMaterial]);
            box.castShadow = true;
            box.position.set(0, h / 2, 0);
            
            const edgesGeo = new THREE.EdgesGeometry(geometry);
            const wireframe = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: 0xffdd77 }));
            wireframe.position.copy(box.position);
            
            return { box, wireframe };
        }
        
        function updateLabel(l, w, h, area, volume) {
            if (dimensionLabel) scene.remove(dimensionLabel);
            const div = document.createElement('div');
            div.innerHTML = `<div style="background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); padding:6px 14px; border-radius:20px; border-left:3px solid #4ade80;">
                <div style="color:#ffdd77;">📦 ${l.toFixed(2)} × ${w.toFixed(2)} × ${h.toFixed(2)} m</div>
                <div style="color:#4ade80; font-size:12px;">面积: ${area.toFixed(2)} m² | 体积: ${volume.toFixed(2)} m³</div>
            </div>`;
            const label = new CSS2DObject(div);
            label.position.set(0, h + 0.25, 0);
            scene.add(label);
            dimensionLabel = label;
        }
        
        function updateUI() {
            let l = parseFloat(document.getElementById('lengthSlider').value);
            let w = parseFloat(document.getElementById('widthSlider').value);
            let h = parseFloat(document.getElementById('heightSlider').value);
            
            document.getElementById('lengthValue').innerText = l.toFixed(2) + ' m';
            document.getElementById('widthValue').innerText = w.toFixed(2) + ' m';
            document.getElementById('heightValue').innerText = h.toFixed(2) + ' m';
            document.getElementById('lengthInput').value = l.toFixed(2);
            document.getElementById('widthInput').value = w.toFixed(2);
            document.getElementById('heightInput').value = h.toFixed(2);
            
            const area = 2 * (l * w + l * h + w * h);
            const volume = l * w * h;
            const perimeter = 4 * (l + w + h);
            const diagonal = Math.sqrt(l*l + w*w + h*h);
            
            document.getElementById('totalArea').innerHTML = area.toFixed(2) + ' m²';
            document.getElementById('volume').innerHTML = volume.toFixed(2);
            document.getElementById('perimeter').innerHTML = perimeter.toFixed(2);
            document.getElementById('diagonal').innerHTML = diagonal.toFixed(2);
            
            if (currentBox) scene.remove(currentBox);
            if (currentEdges) scene.remove(currentEdges);
            
            const { box, wireframe } = createBox(l, w, h);
            currentBox = box;
            currentEdges = wireframe;
            scene.add(currentBox);
            scene.add(currentEdges);
            
            updateLabel(l, w, h, area, volume);
            controls.target.set(0, h / 2, 0);
        }
        
        function changeMaterial(type) {
            currentMaterial = type;
            updateUI();
            document.querySelectorAll('.material-btn').forEach(btn => {
                if (btn.dataset.mat === type) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            const names = { cardboard: '瓦楞纸', wood: '木箱', plastic: '塑料', metal: '金属', glass: '玻璃' };
            showToast(`材质已切换: ${names[type]}`);
        }
        
        // 事件绑定
        function bindEvents() {
            ['lengthSlider', 'widthSlider', 'heightSlider'].forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    const val = parseFloat(document.getElementById(id).value);
                    document.getElementById(id.replace('Slider', 'Input')).value = val.toFixed(2);
                    updateUI();
                });
            });
            ['lengthInput', 'widthInput', 'heightInput'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    let val = parseFloat(document.getElementById(id).value);
                    if (isNaN(val)) val = 1;
                    val = Math.min(100, Math.max(0.2, val));
                    document.getElementById(id.replace('Input', 'Slider')).value = val;
                    updateUI();
                });
            });
            document.querySelectorAll('.material-btn').forEach(btn => {
                btn.addEventListener('click', () => changeMaterial(btn.dataset.mat));
            });
        }
        
        // 全局函数
        window.exportAsImage = () => {
            const link = document.createElement('a');
            link.download = 'packaging-design.png';
            link.href = renderer.domElement.toDataURL();
            link.click();
            showToast('截图已保存');
        };
        
        window.copyData = () => {
            const l = parseFloat(document.getElementById('lengthSlider').value);
            const w = parseFloat(document.getElementById('widthSlider').value);
            const h = parseFloat(document.getElementById('heightSlider').value);
            const area = 2 * (l * w + l * h + w * h);
            const volume = l * w * h;
            navigator.clipboard.writeText(`📦 包装数据\n长:${l.toFixed(2)}m 宽:${w.toFixed(2)}m 高:${h.toFixed(2)}m\n面积:${area.toFixed(2)}m² 体积:${volume.toFixed(2)}m³`);
            showToast('数据已复制');
        };
        
        window.resetView = () => {
            const h = parseFloat(document.getElementById('heightSlider').value);
            camera.position.set(4, 3, 5);
            controls.target.set(0, h / 2, 0);
            controls.update();
            showToast('视角已重置');
        };
        
        let autoRotate = false;
        window.toggleAutoRotate = () => {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
            showToast(autoRotate ? '自动旋转开启' : '自动旋转关闭');
        };
        
        window.optimizeDimensions = () => {
            let l = parseFloat(document.getElementById('lengthSlider').value);
            let w = parseFloat(document.getElementById('widthSlider').value);
            let h = parseFloat(document.getElementById('heightSlider').value);
            const volume = l * w * h;
            const ideal = Math.pow(volume, 1/3);
            document.getElementById('lengthSlider').value = ideal;
            document.getElementById('widthSlider').value = ideal;
            document.getElementById('heightSlider').value = ideal;
            updateUI();
            showToast('已优化为立方体');
        };
        
        window.resetToDefault = () => {
            document.getElementById('lengthSlider').value = 1.5;
            document.getElementById('widthSlider').value = 1.0;
            document.getElementById('heightSlider').value = 0.8;
            updateUI();
            resetView();
            showToast('已重置默认尺寸');
        };
        
        window.setPreset = (l, w, h) => {
            document.getElementById('lengthSlider').value = l;
            document.getElementById('widthSlider').value = w;
            document.getElementById('heightSlider').value = h;
            updateUI();
            const maxDim = Math.max(l, w, h);
            const distance = Math.max(3, maxDim * 1.5);
            camera.position.set(distance * 0.8, distance * 0.6, distance);
            controls.target.set(0, h / 2, 0);
            controls.update();
            showToast(`预设: ${l}×${w}×${h} m`);
        };
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            stars.rotation.y += 0.0005;
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        bindEvents();
        updateUI();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
